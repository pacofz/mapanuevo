<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudio Cúpula | Archivo Dinámico</title>
    
    <link rel="icon" href="assets/images/logo.jpeg" type="image/png">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fjalla+One&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <style>
        :root { --text-color: #000000; --accent-bordo: #800020; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; overflow: hidden; background: #f8f8f8; }

        header { 
            position: fixed; top: 0; left: 0; width: 100%; height: 70px; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 40px; box-sizing: border-box; 
            background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(5px); 
            z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.03);
        }
        
        .brand-container {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }

        .logo-img {
            height: 40px;
            width: auto;
            mix-blend-mode: multiply;
        }

        .logo-header { font-family: 'Playfair Display', serif; font-size: 22px; letter-spacing: 1px; }
        
        .stats { display: flex; gap: 40px; }
        
        .stat-item { text-align: center; cursor: pointer; position: relative; padding: 10px; border-radius: 8px; transition: all 0.3s ease; }
        .stat-item:hover { background: rgba(0,0,0,0.05); transform: translateY(-2px); }
        
        .stat-value { display: block; font-size: 18px; font-weight: 200; color: var(--accent-bordo); min-width: 80px; }
        .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #888; }

        .dropdown-menu {
            position: absolute; top: 100%; right: 0; 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px);
            border: 1px solid rgba(0,0,0,0.05); border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            display: block; opacity: 0; pointer-events: none; 
            z-index: 1001; padding: 15px; transition: all 0.3s ease; transform: translateY(-10px);
        }
        .dropdown-menu.active { opacity: 1; pointer-events: auto; transform: translateY(0); }
        
        #proyectos-menu { 
            min-width: 320px; 
            max-width: 90vw; 
            max-height: 400px; 
            overflow-y: auto; 
            text-align: left; 
        }
        
        .proyecto-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 10px 8px; 
            border-bottom: 1px solid rgba(0,0,0,0.03); 
            cursor: pointer; 
            gap: 15px; 
            border-radius: 4px; 
            transition: background 0.2s; 
        }
        .proyecto-item:hover { background: rgba(128, 0, 32, 0.05); color: var(--accent-bordo); }
        .proyecto-item span:last-child { color: #ccc; font-size: 0.9em; flex-shrink: 0; }

        #map { width: 100%; height: 100vh; z-index: 1; }
        .marker-dot { width: 8px !important; height: 8px !important; background-color: var(--accent-bordo); border-radius: 50%; border: 1.5px solid #fff; }
        .marker-line { position: absolute; bottom: 4px; left: 50%; width: 1px; height: 35px; background: var(--accent-bordo); transform: translateX(-0.5px); opacity: 0; transition: opacity 0.3s ease; }
        
        .marker-studio-home { width: 48px !important; height: 48px !important; display: flex; align-items: center; justify-content: center; color: var(--accent-bordo); cursor: pointer; }
        .marker-studio-home span.material-symbols-outlined { 
            font-family: 'Material Symbols Outlined' !important;
            font-size: 40px; 
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 40;
        }

        .leaflet-tooltip-own { 
            background: transparent !important; 
            border: none !important; 
            box-shadow: none !important; 
            color: var(--text-color) !important; 
            font-size: 10.5px; 
            text-transform: uppercase; 
            padding: 0 !important; 
            opacity: 0 !important; 
            transition: opacity 0.3s ease;
            cursor: pointer !important; /* Indica que es cliqueable */
            pointer-events: auto !important; /* Habilita interacción */
        }
        .leaflet-tooltip-own::before { display: none !important; }

        .tooltip-studio { 
            font-family: 'Fjalla One', sans-serif !important;
            font-weight: 400 !important; 
            font-size: 15px !important; 
            margin-top: -15px !important; 
            opacity: 1 !important; 
            letter-spacing: 0.5px;
        }
        
        .show-label { opacity: 1 !important; }
        .collision-hidden { opacity: 0 !important; pointer-events: none !important; }

        .leaflet-popup-content-wrapper { background: rgba(255,255,255,0.9) !important; backdrop-filter: blur(10px); border-radius: 15px !important; padding: 0 !important; overflow: hidden; }
        .leaflet-popup-content { margin: 0 !important; }
        
        .studio-popup-menu { display: flex; flex-direction: column; min-width: 312px; } 
        .studio-option { 
            display: flex; justify-content: space-between; padding: 20px 25px; 
            text-decoration: none; color: #000 !important; 
            font-size: 12px; text-transform: uppercase; 
            border-bottom: 1px solid rgba(0,0,0,0.05); 
            transition: all 0.3s ease; 
        }
        .studio-option:hover { background: rgba(128, 0, 32, 0.05); color: var(--accent-bordo) !important; padding-left: 30px; }

        #project-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            width: min-content; 
            max-width: 90vw;
            background: transparent; 
            z-index: 2000;
            display: none; flex-direction: column; overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            transition: all 0.4s ease; opacity: 0;
            border-radius: 20px;
        }
        #project-modal.active { display: flex; opacity: 1; transform: translate(-50%, -50%) scale(1); }

        .modal-carousel { position: relative; width: min-content; line-height: 0; background: #000; }
        .modal-carousel img { 
            display: block; 
            max-width: 90vw; max-height: 65vh; 
            width: auto; height: auto; 
            object-fit: contain;
        }
        
        .modal-closer { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.4); color: white; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 2010; }
        
        .nav-btn { 
            position: absolute; top: 50%; transform: translateY(-50%); 
            background: rgba(255,255,255,0.1); color: white; border: none; 
            width: 44px; height: 44px; border-radius: 50%; cursor: pointer; 
            z-index: 10; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(8px); transition: background 0.3s;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.3); }

        .modal-info { 
            padding: 25px; 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(15px);
            width: 100%; box-sizing: border-box;
            border-top: 1px solid rgba(0,0,0,0.05);
        }
        .modal-info h2 { margin: 0; font-family: 'Playfair Display', serif; font-size: 22px; color: #000; }
        .modal-info p { color: #333; font-size: 13.5px; margin: 12px 0; line-height: 1.5; font-weight: 300; }
        .modal-tags { display: flex; gap: 15px; font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; }

        #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); z-index: 1999; display: none; }

        @media (max-width: 600px) {
            header { padding: 0 15px; }
            .logo-header { font-size: 16px; }
            .stats { gap: 10px; }
            .stat-item { padding: 5px; }
            .stat-value { font-size: 14px; min-width: 60px; }
            .stat-label { font-size: 8px; }

            #proyectos-menu { 
                min-width: 280px; 
                right: -15px;
            }
            .proyecto-item {
                gap: 10px;
                padding: 12px 8px;
                font-size: 13px;
            }
            .proyecto-item span:first-child {
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            
            .studio-popup-menu { min-width: 260px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-container" onclick="map.flyTo([-34.48, -58.55], 11)">
            <img src="assets/images/logo.jpeg" alt="Logo Estudio Cúpula" class="logo-img">
            <div class="logo-header">ESTUDIO CÚPULA</div>
        </div>
        <div class="stats">
            <div class="stat-item" onclick="toggleMenu('proyectos-menu')">
                <span class="stat-value" id="count-obras">0</span>
                <span class="stat-label">Obras ▾</span>
                <div id="proyectos-menu" class="dropdown-menu"></div>
            </div>
            <div class="stat-item" onclick="toggleMenu('m2-menu')">
                <span class="stat-value" id="count-m2">0</span>
                <span class="stat-label">m² Totales ▾</span>
                <div id="m2-menu" class="dropdown-menu">
                    <div style="display:flex; justify-content:space-between; width:160px; font-size:12px; margin-bottom:8px;"><span>Construido</span><span id="m2-c">0</span></div>
                    <div style="display:flex; justify-content:space-between; width:160px; font-size:12px;"><span>Refaccionado</span><span id="m2-r">0</span></div>
                </div>
            </div>
        </div>
    </header>

    <div id="map"></div>
    <div id="modal-overlay" onclick="closeAllModals()"></div>

    <div id="project-modal">
        <button class="modal-closer" onclick="closeAllModals()"><span class="material-symbols-outlined">close</span></button>
        <div class="modal-carousel">
            <button class="nav-btn" style="left: 15px" onclick="changeImage(-1)"><span class="material-symbols-outlined">chevron_left</span></button>
            <img id="modal-img" src="" alt="">
            <button class="nav-btn" style="right: 15px" onclick="changeImage(1)"><span class="material-symbols-outlined">chevron_right</span></button>
        </div>
        <div class="modal-info">
            <h2 id="modal-title"></h2>
            <p id="modal-desc"></p>
            <div class="modal-tags">
                <span id="modal-year"></span> • <span id="modal-m2"></span> • <span id="modal-area"></span>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let allProjects = [];
        let currentProject = null;
        let currentImgIdx = 1;
        let map;
        let markerList = [];
        let markersMap = {};

        async function init() {
            try {
                const res = await fetch('proyectos.json');
                allProjects = await res.json();
                allProjects.sort((a, b) => a.title.localeCompare(b.title));
                renderMap();
                updateStats();
                renderList();
            } catch (e) { console.error(e); }
        }

        function animateValue(id, start, end, duration) {
            const obj = document.getElementById(id);
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const easedProgress = Math.pow(progress, 2); 
                const current = Math.floor(easedProgress * (end - start) + start);
                obj.innerText = current.toLocaleString();
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                } else {
                    obj.innerText = end.toLocaleString();
                }
            };
            window.requestAnimationFrame(step);
        }

        function renderMap() {
            map = L.map('map', { center: [-34.48, -58.55], zoom: 11, zoomControl: false, attributionControl: false });
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

            allProjects.forEach((p) => {
                const isStudio = p.title.toLowerCase().includes("santo domingo");
                const icon = L.divIcon({
                    className: isStudio ? 'marker-studio-home' : 'marker-dot',
                    html: isStudio ? '<span class="material-symbols-outlined">home</span>' : '<div class="marker-line"></div>',
                    iconSize: isStudio ? [48, 48] : [8, 8],
                    iconAnchor: isStudio ? [24, 24] : [4, 4]
                });

                const m = L.marker([p.lat, p.lng], { icon, isStudio }).addTo(map);
                
                // TOOLTIP CONFIG: Se añade interactive: true para que detecte el clic
                const tooltip = L.tooltip({ 
                    permanent: true, 
                    direction: 'top', 
                    className: isStudio ? 'leaflet-tooltip-own tooltip-studio' : 'leaflet-tooltip-own', 
                    offset: isStudio ? [0, -25] : [0, -39],
                    interactive: true 
                }).setContent(isStudio ? "ESTUDIO CÚPULA" : p.title);
                
                m.bindTooltip(tooltip);

                // Función unificada de clic
                const handleProjectClick = () => {
                    map.flyTo(m.getLatLng(), 15);
                    if (isStudio) {
                        const studioMenuHtml = `
                            <div class="studio-popup-menu">
                                <a href="estudio.html" class="studio-option"><span>Estudio Cúpula</span><span class="material-symbols-outlined" style="font-size:14px">chevron_right</span></a>
                                <a href="obras.html" class="studio-option"><span>Seguimiento de Obras</span><span class="material-symbols-outlined" style="font-size:14px">chevron_right</span></a>
                                <a href="bim.html" class="studio-option"><span>BIM y Documentación</span><span class="material-symbols-outlined" style="font-size:14px">chevron_right</span></a>
                            </div>`;
                        L.popup({ offset: [0, -20], closeButton: false }).setLatLng(m.getLatLng()).setContent(studioMenuHtml).openOn(map);
                    } else { openProject(p); }
                };

                // Asignar clic al marcador y al tooltip
                m.on('click', handleProjectClick);
                m.on('tooltipopen', (e) => {
                    e.tooltip.getElement().addEventListener('click', (event) => {
                        event.stopPropagation();
                        handleProjectClick();
                    });
                });

                markersMap[p.title] = m;
                markerList.push(m);
            });
            map.on('zoomend move moveend', updateVisibility);
            updateVisibility();
        }

        function updateVisibility() {
            const zoom = map.getZoom();
            const threshold = 13;
            const visibleRects = [];
            markerList.forEach(m => {
                const tooltip = m.getTooltip();
                const line = m._icon ? m._icon.querySelector('.marker-line') : null;
                if (!tooltip || !tooltip._container) return;
                tooltip._container.classList.remove('show-label', 'collision-hidden');
                if (line) line.style.opacity = "0";
                if (zoom >= threshold) {
                    const rect = tooltip._container.getBoundingClientRect();
                    const overlaps = visibleRects.some(r => !(rect.right < r.left || rect.left > r.right || rect.bottom < r.top || rect.top > r.bottom));
                    if (overlaps && !m.options.isStudio) { tooltip._container.classList.add('collision-hidden'); } 
                    else { tooltip._container.classList.add('show-label'); if (line) line.style.opacity = "1"; visibleRects.push(rect); }
                }
            });
        }

        function openProject(p) {
            currentProject = p; currentImgIdx = 1;
            document.getElementById('modal-title').innerText = p.title;
            document.getElementById('modal-desc').innerText = p.desc;
            document.getElementById('modal-year').innerText = p.year;
            document.getElementById('modal-m2').innerText = p.m2 + " m²";
            document.getElementById('modal-area').innerText = p.area;
            updateImage();
            document.getElementById('modal-overlay').style.display = 'block';
            document.getElementById('project-modal').classList.add('active');
        }

        function updateImage() {
            const img = document.getElementById('modal-img');
            img.style.opacity = '0';
            img.src = `assets/images/${currentProject.folder}/${currentImgIdx}.${currentProject.imgExt}`;
            img.onload = () => { img.style.opacity = '1'; };
        }

        function changeImage(dir) {
            currentImgIdx += dir;
            if (currentImgIdx > currentProject.imgCount) currentImgIdx = 1;
            if (currentImgIdx < 1) currentImgIdx = currentProject.imgCount;
            updateImage();
        }

        function closeAllModals() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('project-modal').classList.remove('active');
            map.closePopup();
        }

        function toggleMenu(id) {
            const m = document.getElementById(id);
            const active = m.classList.contains('active');
            document.querySelectorAll('.dropdown-menu').forEach(x => x.classList.remove('active'));
            if (!active) m.classList.add('active');
        }

        function updateStats() {
            const numObras = allProjects.length;
            const totalM2 = allProjects.reduce((a, b) => a + (parseFloat(b.m2) || 0), 0);
            animateValue('count-obras', 0, numObras, 4000);
            animateValue('count-m2', 0, totalM2, 4000);

            document.getElementById('m2-c').innerText = allProjects.filter(x=>x.m2Type==='construido').reduce((a,b)=>a+(parseFloat(b.m2)||0),0).toLocaleString() + " m²";
            document.getElementById('m2-r').innerText = allProjects.filter(x=>x.m2Type==='refaccionado').reduce((a,b)=>a+(parseFloat(b.m2)||0),0).toLocaleString() + " m²";
        }

        function renderList() {
            const list = document.getElementById('proyectos-menu');
            list.innerHTML = allProjects.map(p => `<div class="proyecto-item" onclick="handleNav('${p.title}')"><span>${p.title}</span><span>${p.year}</span></div>`).join('');
        }

        window.handleNav = (title) => {
            toggleMenu('proyectos-menu');
            const m = markersMap[title];
            m.fire('click');
        };

        window.onclick = (e) => { if (!e.target.closest('.stat-item')) document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('active')); };
        init();
    </script>
</body>
</html>
