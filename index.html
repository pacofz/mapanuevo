<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudio Cupula | Archivo Dinámico</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    
    <style>
        :root { --text-color: #1a1a1a; --accent-bordo: #800020; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; overflow: hidden; }

        header { 
            position: fixed; top: 0; left: 0; width: 100%; height: 70px; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 40px; box-sizing: border-box; 
            background: rgba(255, 255, 255, 0.4); 
            backdrop-filter: blur(5px); 
            z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.03);
        }

        .logo-header { font-family: 'Playfair Display', serif; font-size: 22px; letter-spacing: 1px; }
        .stats { display: flex; gap: 40px; }
        .stat-item { text-align: center; }
        .stat-value { display: block; font-size: 18px; font-weight: 300; color: var(--accent-bordo); min-width: 80px; }
        .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #888; }

        #map { width: 100%; height: 100vh; background: #f8f8f8; }

        .marker-dot { width: 8px !important; height: 8px !important; background-color: var(--accent-bordo); border-radius: 50%; border: 1.5px solid #fff; box-shadow: 0 0 5px rgba(0,0,0,0.2); }
        .marker-santo-domingo { width: 16px !important; height: 16px !important; background-color: var(--accent-bordo); border-radius: 50%; border: 2px solid #fff; box-shadow: 0 0 8px rgba(0,0,0,0.3); }

        .marker-line { position: absolute; bottom: 4px; left: 50%; width: 1px; height: 35px; background: var(--accent-bordo); transform: translateX(-0.5px); transition: opacity 0.3s ease; }

        .leaflet-tooltip-own { 
            background: transparent !important; 
            border: none !important; 
            box-shadow: none !important; 
            color: var(--text-color) !important; 
            font-family: 'Inter', sans-serif; 
            font-weight: 300; 
            font-size: 10.5px; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            padding: 0 !important; 
            margin-top: -38px !important; 
            transition: opacity 0.3s ease; 
            white-space: nowrap; 
            pointer-events: none;
        }

        .no-line .marker-line { display: none !important; }
        .hide-text .leaflet-tooltip-own, .hide-text .marker-line { opacity: 0 !important; }
        .collision-hidden { opacity: 0 !important; }

        .leaflet-popup-content-wrapper { border-radius: 0; padding: 0; overflow: hidden; }
        .leaflet-popup-content { margin: 0; width: 300px !important; }
        .gallery-container { position: relative; width: 300px; height: 200px; background: #000; overflow: hidden; }
        .gallery-img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.3s; }
        .gallery-img.fading { opacity: 0.3; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.8); border: none; width: 30px; height: 30px; cursor: pointer; font-weight: bold; z-index: 10; display: none; }
        
        .project-info { padding: 20px; }
        .project-info h3 { margin: 0 0 10px 0; font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; }
        .project-meta { margin-top: 15px; display: flex; gap: 20px; font-size: 10px; font-weight: 400; text-transform: uppercase; color: #999; letter-spacing: 1px; }
    </style>
</head>
<body>

    <header>
        <div class="logo-header">ESTUDIO CÚPULA</div>
        <div class="stats">
            <div class="stat-item"><span class="stat-value" id="count-obras">0</span><span class="stat-label">Proyectos</span></div>
            <div class="stat-item"><span class="stat-value" id="count-m2">0</span><span class="stat-label">m² Totales</span></div>
        </div>
    </header>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let allProjects = [];
        let galleryState = {};
        let map;
        let tooltips = [];

        async function loadApp() {
            try {
                const response = await fetch('proyectos.json');
                allProjects = await response.json();
                renderMap();
                updateCounters();
            } catch (e) { console.error("Error al cargar proyectos:", e); }
        }

        function updateCounters() {
            const totalProyectos = allProjects.length;
            const totalM2 = allProjects.reduce((acc, p) => acc + (p.m2 || 0), 0);
            
            const duration = 6000; // 6 segundos
            const start = performance.now();

            function animate(currentTime) {
                const elapsed = currentTime - start;
                const progress = Math.min(elapsed / duration, 1);

                // Ease Out Quad: empieza rápido, termina lento
                const easeOut = 1 - (1 - progress) * (1 - progress);

                const currentProyectos = Math.floor(easeOut * totalProyectos);
                const currentM2 = Math.floor(easeOut * totalM2);

                document.getElementById('count-obras').innerText = currentProyectos;
                document.getElementById('count-m2').innerText = currentM2.toLocaleString();

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    document.getElementById('count-obras').innerText = totalProyectos;
                    document.getElementById('count-m2').innerText = totalM2.toLocaleString();
                }
            }
            requestAnimationFrame(animate);
        }

        function renderMap() {
            map = L.map('map', { center: [-34.48, -58.55], zoom: 11, zoomControl: false, attributionControl: false });
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

            map.on('zoomend move', () => {
                const container = document.getElementById('map');
                if (map.getZoom() < 11) container.classList.add('hide-text');
                else {
                    container.classList.remove('hide-text');
                    handleCollisions();
                }
            });

            allProjects.forEach(project => {
                if (!project.lat || !project.lng) return;
                const isSD = project.title.toLowerCase().includes("santo domingo");
                
                const customIcon = L.divIcon({
                    className: isSD ? 'marker-santo-domingo no-line' : 'marker-dot',
                    iconSize: isSD ? [16, 16] : [8, 8],
                    iconAnchor: isSD ? [8, 8] : [4, 4],
                    html: isSD ? '' : '<div class="marker-line"></div>'
                });

                const marker = L.marker([project.lat, project.lng], { icon: customIcon }).addTo(map);
                marker.bindTooltip(project.title, { 
                    permanent: true, direction: 'top', className: 'leaflet-tooltip-own', offset: [0, isSD ? -12 : -38] 
                });

                marker.on('click', () => detectImagesAndShowPopup(marker, project));
                tooltips.push(marker);
            });

            setTimeout(handleCollisions, 500);
        }

        function handleCollisions() {
            const visibleTooltips = [];
            tooltips.forEach(marker => {
                const tooltip = marker.getTooltip();
                const tooltipElement = tooltip ? tooltip._container : null;
                if (!tooltipElement) return;

                tooltipElement.classList.remove('collision-hidden');
                const markerElement = marker._icon.querySelector('.marker-line');
                if(markerElement) markerElement.classList.remove('collision-hidden');

                const rect = tooltipElement.getBoundingClientRect();
                const isColliding = visibleTooltips.some(otherRect => {
                    return !(rect.right < otherRect.left || rect.left > otherRect.right || 
                             rect.bottom < otherRect.top || rect.top > otherRect.bottom);
                });

                if (isColliding) {
                    tooltipElement.classList.add('collision-hidden');
                    if(markerElement) markerElement.classList.add('collision-hidden');
                } else {
                    visibleTooltips.push(rect);
                }
            });
        }

        async function detectImagesAndShowPopup(marker, project) {
            let count = 0;
            let checkNext = true;
            while (checkNext && count < 15) {
                const exists = await new Promise(resolve => {
                    const img = new Image();
                    img.onload = () => resolve(true);
                    img.onerror = () => resolve(false);
                    img.src = `assets/images/${project.folder}/1.${project.imgExt}`;
                });
                // Nota: Aquí se simplifica la detección para el popup. 
                // En un entorno real se recomienda que el JSON ya traiga el imgCount verificado.
                if (exists) { count = 1; checkNext = false; } 
                else checkNext = false;
            }
            
            const popupHtml = `
                <div class="gallery-container">
                    <button class="nav-btn" style="left:10px; display:none" id="prev-${project.folder}" onclick="event.stopPropagation(); changeImg('${project.folder}', -1)">&#10094;</button>
                    <button class="nav-btn" style="right:10px; display:none" id="next-${project.folder}" onclick="event.stopPropagation(); changeImg('${project.folder}', 1)">&#10095;</button>
                    <img id="img-obj-${project.folder}" src="assets/images/${project.folder}/1.${project.imgExt}" class="gallery-img" onerror="this.src='https://via.placeholder.com/300x200?text=Proximamente'">
                </div>
                <div class="project-info">
                    <h3>${project.title}</h3>
                    <p style="font-size:12px; font-weight:300;">${project.desc}</p>
                    <div class="project-meta"><span>AÑO ${project.year}</span><span>${project.m2} M²</span></div>
                </div>`;
            marker.bindPopup(popupHtml).openPopup();
        }

        window.changeImg = function(folder, direction) {
            const project = allProjects.find(p => p.folder === folder);
            const imgElement = document.getElementById(`img-obj-${folder}`);
            if (!galleryState[folder]) galleryState[folder] = 1;
            imgElement.classList.add('fading');
            setTimeout(() => {
                let current = galleryState[folder] + direction;
                // Aquí se asume que si hay más imágenes siguen el patrón 1, 2, 3...
                galleryState[folder] = current;
                imgElement.src = `assets/images/${folder}/${current}.${project.imgExt}`;
                imgElement.onload = () => imgElement.classList.remove('fading');
            }, 300);
        };

        loadApp();
    </script>
</body>
</html>
