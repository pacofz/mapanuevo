<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudio Cupula | Archivo Dinámico</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    
    <style>
        :root { --text-color: #000000; --accent-bordo: #800020; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; overflow: hidden; }

        header { 
            position: fixed; top: 0; left: 0; width: 100%; height: 70px; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 40px; box-sizing: border-box; 
            background: rgba(255, 255, 255, 0.4); 
            backdrop-filter: blur(5px); 
            z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.03);
        }

        .logo-header { font-family: 'Playfair Display', serif; font-size: 22px; letter-spacing: 1px; }
        .stats { display: flex; gap: 40px; }
        .stat-item { text-align: center; cursor: pointer; position: relative; padding: 10px; }
        .stat-value { display: block; font-size: 18px; font-weight: 200; color: var(--accent-bordo); min-width: 80px; }
        .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #888; }

        .dropdown-menu {
            position: absolute; top: 100%; right: 0; 
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            display: none; z-index: 1001;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }
        .dropdown-menu.active { display: block; }

        #m2-menu { min-width: 220px; }
        #proyectos-menu { min-width: 380px; max-height: 450px; overflow-y: auto; text-align: left; }

        .m2-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 12px; border-bottom: 1px solid rgba(0,0,0,0.03); padding-bottom: 6px; }
        .m2-row span:last-child { font-weight: 500; color: var(--accent-bordo); }

        #map { width: 100%; height: 100vh; background: #f8f8f8; }

        /* Marcadores y Líneas */
        .marker-dot { width: 8px !important; height: 8px !important; background-color: var(--accent-bordo); border-radius: 50%; border: 1.5px solid #fff; transition: opacity 0.3s ease; }
        .marker-line { position: absolute; bottom: 4px; left: 50%; width: 1px; height: 35px; background: var(--accent-bordo); transform: translateX(-0.5px); transition: opacity 0.3s ease; transform-origin: bottom; }
        
        .marker-studio-cross { width: 26px !important; height: 26px !important; position: relative; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .marker-studio-cross::before, .marker-studio-cross::after { content: ''; position: absolute; background-color: var(--accent-bordo); border-radius: 1px; }
        .marker-studio-cross::before { width: 4px; height: 100%; }
        .marker-studio-cross::after { width: 100%; height: 4px; }
        
        .leaflet-tooltip-own { background: transparent !important; border: none !important; box-shadow: none !important; color: var(--text-color) !important; font-size: 10.5px; text-transform: uppercase; margin-top: -35px !important; transition: opacity 0.3s ease; }
        .tooltip-studio { font-weight: 600 !important; font-size: 13px !important; margin-top: -15px !important; }

        /* CLASES DE VISIBILIDAD */
        .hide-on-zoom, .collision-hidden { opacity: 0 !important; pointer-events: none !important; }

        /* NUEVO MENÚ DESPLEGABLE ESTUDIO (30% más grande, Tipografía Light, Negro) */
        .studio-popup-menu { padding: 15px 0; display: flex; flex-direction: column; min-width: 260px; }
        .studio-option { 
            display: flex; justify-content: space-between; padding: 18px 25px; 
            text-decoration: none; color: #000; font-size: 13px; font-weight: 300; 
            text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid rgba(0,0,0,0.04); 
            transition: all 0.2s ease;
        }
        .studio-option:last-child { border-bottom: none; }
        .studio-option:hover { background: rgba(0,0,0,0.03); padding-left: 30px; }
        .studio-option.bold { font-weight: 600; }

        .leaflet-popup-content-wrapper { background: rgba(255, 255, 255, 0.98) !important; border-radius: 14px !important; box-shadow: 0 20px 40px rgba(0,0,0,0.15) !important; }
        .leaflet-popup-content { margin: 0 !important; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <div class="logo-header">ESTUDIO CÚPULA</div>
        <div class="stats">
            <div class="stat-item" onclick="toggleMenu('proyectos-menu')">
                <span class="stat-value" id="count-obras">0</span>
                <span class="stat-label">Proyectos ▾</span>
                <div id="proyectos-menu" class="dropdown-menu"></div>
            </div>
            <div class="stat-item" onclick="toggleMenu('m2-menu')">
                <span class="stat-value" id="count-m2">0</span>
                <span class="stat-label">m² Totales ▾</span>
                <div id="m2-menu" class="dropdown-menu">
                    <div class="m2-row"><span>Construido</span><span id="m2-construido">0</span></div>
                    <div class="m2-row"><span>Refaccionado</span><span id="m2-refaccionado">0</span></div>
                </div>
            </div>
        </div>
    </header>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let allProjects = [];
        let map;
        let markersMap = {};
        let markerList = [];

        async function loadApp() {
            try {
                const response = await fetch('proyectos.json');
                allProjects = await response.json();
                allProjects.sort((a, b) => a.title.localeCompare(b.title));
                renderMap();
                updateCounters();
                renderProyectosList();
            } catch (e) { console.error("Error cargando JSON:", e); }
        }

        function updateCounters() {
            const parseM2 = (val) => parseFloat(val) || 0;
            document.getElementById('count-obras').innerText = allProjects.length;
            const totalM2 = allProjects.reduce((acc, p) => acc + parseM2(p.m2), 0);
            document.getElementById('count-m2').innerText = totalM2.toLocaleString();
            document.getElementById('m2-construido').innerText = allProjects.filter(p => p.m2Type === 'construido').reduce((acc, p) => acc + parseM2(p.m2), 0).toLocaleString() + ' m²';
            document.getElementById('m2-refaccionado').innerText = allProjects.filter(p => p.m2Type === 'refaccionado').reduce((acc, p) => acc + parseM2(p.m2), 0).toLocaleString() + ' m²';
        }

        function renderProyectosList() {
            const container = document.getElementById('proyectos-menu');
            container.innerHTML = allProjects.map(p => `
                <div class="proyecto-item" onclick="handleNavigation('${p.title}')" style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid rgba(0,0,0,0.03); cursor:pointer;">
                    <span style="font-weight:400; text-transform:uppercase; font-size:11px;">${p.title === "Santo Domingo" ? "Estudio Cúpula" : p.title}</span>
                    <span style="color:#888; font-weight:200; font-size:11px;">${p.year}</span>
                </div>
            `).join('');
        }

        function handleNavigation(title) {
            const marker = markersMap[title];
            if (marker) {
                map.flyTo(marker.getLatLng(), 15);
                setTimeout(() => marker.fire('click'), 400);
            }
        }

        function toggleMenu(id) {
            document.querySelectorAll('.dropdown-menu').forEach(m => {
                if(m.id !== id) m.classList.remove('active');
            });
            document.getElementById(id).classList.toggle('active');
        }

        function updateVisibility() {
            const zoom = map.getZoom();
            const threshold = 13; 
            const visibleRects = [];

            markerList.forEach(marker => {
                const tooltip = marker.getTooltip();
                const iconContainer = marker._icon;
                const line = iconContainer ? iconContainer.querySelector('.marker-line') : null;
                if (!tooltip || !tooltip._container) return;

                tooltip._container.classList.remove('hide-on-zoom', 'collision-hidden');
                if (line) line.classList.remove('hide-on-zoom', 'collision-hidden');

                if (zoom < threshold) {
                    tooltip._container.classList.add('hide-on-zoom');
                    if (line) line.classList.add('hide-on-zoom');
                    return;
                }

                const rect = tooltip._container.getBoundingClientRect();
                const overlaps = visibleRects.some(r => !(rect.right < r.left || rect.left > r.right || rect.bottom < r.top || rect.top > r.bottom));

                if (overlaps && !marker.options.isStudio) {
                    tooltip._container.classList.add('collision-hidden');
                    if (line) line.classList.add('collision-hidden');
                } else {
                    visibleRects.push(rect);
                }
            });
        }

        function renderMap() {
            map = L.map('map', { center: [-34.48, -58.55], zoom: 11, zoomControl: false, attributionControl: false });
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

            allProjects.forEach(project => {
                if (!project.lat || !project.lng) return;
                const isStudio = project.title.toLowerCase() === "santo domingo";
                
                const customIcon = L.divIcon({
                    className: isStudio ? 'marker-studio-cross' : 'marker-dot',
                    iconSize: isStudio ? [26, 26] : [8, 8],
                    iconAnchor: isStudio ? [13, 13] : [4, 4],
                    html: isStudio ? '' : '<div class="marker-line"></div>'
                });

                const marker = L.marker([project.lat, project.lng], { icon: customIcon, isStudio: isStudio }).addTo(map);
                const displayTitle = isStudio ? "ESTUDIO CÚPULA" : project.title;

                marker.bindTooltip(displayTitle, { 
                    permanent: true, direction: 'top', 
                    className: isStudio ? 'leaflet-tooltip-own tooltip-studio' : 'leaflet-tooltip-own', 
                    offset: isStudio ? [0, -15] : [0, -35]
                });

                marker.on('click', () => {
                    if (isStudio) {
                        const studioMenuHtml = `
                            <div class="studio-popup-menu">
                                <a href="estudio.html" class="studio-option bold"><span>Estudio Cúpula</span></a>
                                <a href="obras.html" class="studio-option"><span>Seguimiento de Obras</span></a>
                                <a href="bim.html" class="studio-option"><span>BIM y Documentación</span></a>
                            </div>`;
                        L.popup({ offset: [0, -20], closeButton: false }).setLatLng(marker.getLatLng()).setContent(studioMenuHtml).openOn(map);
                    } else {
                        const popupHtml = `
                            <div style="width:300px; height:200px; background:#000; overflow:hidden;"><img src="assets/images/${project.folder}/1.${project.imgExt}" style="width:100%; height:100%; object-fit:cover;" onerror="this.src='https://via.placeholder.com/300x200?text=Estudio+Cupula'"></div>
                            <div style="padding:20px; background:white;"><h3 style="margin:0 0 8px 0; font-family:'Playfair Display',serif;">${project.title}</h3><p style="font-size:12px; margin:0; color:#444;">${project.desc}</p><div style="margin-top:10px; font-size:9px; color:#888; text-transform:uppercase;">${project.year} • ${project.m2} m²</div></div>`;
                        marker.bindPopup(popupHtml).openPopup();
                    }
                });

                markersMap[project.title] = marker;
                markerList.push(marker);
            });

            map.on('zoomend move moveend', updateVisibility);
            setTimeout(updateVisibility, 800);
        }

        window.onclick = (e) => {
            if (!e.target.closest('.stat-item')) document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('active'));
        };

        loadApp();
    </script>
</body>
</html>
